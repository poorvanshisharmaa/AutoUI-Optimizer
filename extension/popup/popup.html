<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AutoUI Optimizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      min-height: 480px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
    }
    .header {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 { font-size: 16px; font-weight: 700; }
    .header span { font-size: 11px; opacity: 0.8; }
    .badge {
      margin-left: auto;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 10px;
    }
    .section { padding: 16px 20px; border-bottom: 1px solid #1e1e2e; }
    .section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #6366f1; margin-bottom: 12px; }
    .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .metric-card {
      background: #1a1a2e;
      border-radius: 8px;
      padding: 10px 12px;
      border: 1px solid #2d2d44;
    }
    .metric-card .label { font-size: 10px; color: #94a3b8; margin-bottom: 4px; }
    .metric-card .value { font-size: 20px; font-weight: 700; }
    .good { color: #22c55e; }
    .needs-improvement { color: #f59e0b; }
    .poor { color: #ef4444; }
    .score-ring {
      display: flex; flex-direction: column; align-items: center; padding: 20px;
    }
    .score-number { font-size: 48px; font-weight: 800; color: #6366f1; }
    .score-label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
    .suggestions-list { list-style: none; }
    .suggestion-item {
      background: #1a1a2e; border-radius: 8px; padding: 10px 12px;
      margin-bottom: 8px; border-left: 3px solid #6366f1;
      font-size: 12px; line-height: 1.5;
    }
    .suggestion-item .impact {
      display: inline-block; background: #6366f1; color: white;
      border-radius: 4px; padding: 1px 6px; font-size: 10px; margin-top: 6px;
    }
    .btn {
      width: 100%; padding: 10px; border-radius: 8px; border: none;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #6366f1; color: white; }
    .btn-secondary { background: #1a1a2e; color: #e2e8f0; border: 1px solid #2d2d44; margin-top: 8px; }
    .btn-settings { background: transparent; color: #94a3b8; border: 1px solid #2d2d44; margin-top: 8px; font-size: 11px; padding: 6px; }
    .loading { text-align: center; padding: 24px; color: #94a3b8; font-size: 13px; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #2d2d44; border-top-color: #6366f1;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .footer { padding: 12px 20px; display: flex; gap: 8px; flex-direction: column; }
    .session-id { font-size: 9px; color: #4c4c7a; text-align: center; padding: 4px 20px 8px; font-family: monospace; }
  </style>
</head>
<body>
  <div class="header">
    <div class="status-dot"></div>
    <div>
      <h1>AutoUI Optimizer</h1>
      <span>AI Performance Analysis</span>
    </div>
    <div class="badge">LIVE</div>
  </div>

  <div id="app">
    <div class="loading">
      <div class="spinner"></div>
      Collecting metrics...
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
