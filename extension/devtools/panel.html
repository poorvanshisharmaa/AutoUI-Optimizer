<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AutoUI Optimizer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #e2e8f0;
      padding: 20px;
      min-height: 100vh;
    }
    h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: #a5b4fc; }
    .card {
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }
    .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; }
    .value { font-size: 24px; font-weight: 700; }
    .good    { color: #22c55e; }
    .warn    { color: #f59e0b; }
    .poor    { color: #ef4444; }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .suggestion {
      border-left: 3px solid #6366f1;
      padding: 10px 14px;
      background: #1a1a2e;
      border-radius: 6px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .suggestion strong { display: block; margin-bottom: 4px; }
    .suggestion span { color: #94a3b8; font-size: 12px; }
    button {
      padding: 8px 18px; border-radius: 6px; border: none;
      background: #6366f1; color: white; font-size: 13px;
      font-weight: 600; cursor: pointer;
    }
    #status { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h2>AutoUI Optimizer — DevTools Panel</h2>
  <div id="status">Waiting for page inspection...</div>
  <div class="grid" id="vitals"></div>
  <div id="suggestions-wrap"></div>
  <button id="btn-refresh">Refresh Analysis</button>

  <script src="panel.js"></script>
</body>
</html>
